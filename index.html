    <title>Фокус-таймер — Premium Soft UI</title>

    <!-- Дизайн-система Точилки — базовые токены и глобальные стили -->
    <link rel="stylesheet" href="https://raw.githubusercontent.com/onlinetochilka/theme/main/tochilka-theme.css">

    <style>
        /* ─── Локальная палитра неоморфизма ──────────────────────────────────── */
        :root {
            --bg-color:    #e0e5ec;
            --shadow-light: #ffffff;
            --shadow-dark:  #b8c2d1;

            --brand-red:  #B71234;
            --brand-teal: #006584;
            --theme-color: #006584;
            --color-rest:  #4CAF50;

            --text-main:  #2d3436;
            --text-muted: #747d8c;

            --shadow-sm:       4px 4px 10px var(--shadow-dark), -4px -4px 10px var(--shadow-light);
            --shadow-sm-inset: inset 3px 3px 8px var(--shadow-dark), inset -3px -3px 8px var(--shadow-light);
            --shadow-md:       6px 6px 16px var(--shadow-dark), -6px -6px 16px var(--shadow-light);
            --shadow-md-inset: inset 5px 5px 12px var(--shadow-dark), inset -5px -5px 12px var(--shadow-light);
            --shadow-lg:       14px 14px 36px var(--shadow-dark), -14px -14px 36px var(--shadow-light);
            --shadow-lg-inset: inset 10px 10px 24px var(--shadow-dark), inset -10px -10px 24px var(--shadow-light);
            --shadow-xl:       20px 20px 60px var(--shadow-dark), -20px -20px 60px var(--shadow-light);

            --error-glow: 0 0 0 2px var(--brand-red);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            max-height: 100vh;
            overflow: hidden;
            padding: 12px;
            transition: background 0.7s ease, color 0.7s ease;
        }

        /* ─── Тёмный режим «Отдых» ───────────────────────────────────────────── */
        body.rest-mode {
            --bg-color:     #1c2433;
            --shadow-light: #263044;
            --shadow-dark:  #0e131c;
            --text-main:    #e4eaf2;
            --text-muted:   #8a9bb5;
            background: linear-gradient(160deg, #0f1520 0%, #1a2438 45%, #121a28 100%);
        }

        body.rest-mode .btn-start {
            box-shadow: 8px 8px 24px rgba(0,0,0,0.35), -4px -4px 16px var(--shadow-light);
        }

        /* ─── Оболочка приложения ────────────────────────────────────────────── */
        .app-shell {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 100%;
            max-height: calc(100vh - 24px);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        /* ─── Карточка ──────────────────────────────────────────────────────── */
        .app-card.card {
            background: var(--bg-color);
            border-radius: 40px;
            padding: 28px 30px 22px;
            width: 100%;
            height: 100%;
            max-height: 100%;
            box-shadow: var(--shadow-xl);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 0;
            overflow: visible;
            position: relative;
            transition: background 0.7s ease, box-shadow 0.7s ease, border-radius 0.5s ease;
        }

        .app-card.card > .card-chrome,
        .app-card.card > .timer-stage,
        .app-card.card > .card-chrome-bottom {
            position: relative;
            z-index: 1;
            width: 100%;
        }

        .card-chrome {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
            transition: all 0.5s ease-in-out;
        }

        /* ─── Шапка ─────────────────────────────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 16px;
            width: 100%;
            flex-shrink: 0;
            transition: all 0.5s ease-in-out;
        }

        .header-logo {
            width: 48px;
            height: 48px;
            filter: drop-shadow(3px 3px 6px rgba(184,194,209,0.6)) drop-shadow(-2px -2px 4px #ffffff);
            animation: spinLogo 12s linear infinite;
            animation-play-state: paused;
        }

        body.rest-mode .header-logo {
            filter: drop-shadow(3px 3px 6px rgba(0,0,0,0.4)) drop-shadow(-2px -2px 4px rgba(255,255,255,0.08));
        }

        .header-logo.running { animation-play-state: running; }

        .header-text {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .header-title  { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.5px; line-height: 1.2; }
        .header-slogan { font-size: 0.9rem; color: var(--text-muted); font-weight: 500; }

        @keyframes spinLogo { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ─── Сетка режимов 2×2 ──────────────────────────────────────────────── */
        .modes-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            margin-bottom: 12px;
            flex-shrink: 0;
            transition: all 0.5s ease-in-out;
        }

        .mode-btn {
            background: var(--bg-color);
            border: none;
            color: var(--text-muted);
            padding: 13px 12px;
            border-radius: 14px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s ease, background 0.7s ease, box-shadow 0.7s ease;
            box-shadow: var(--shadow-md);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 46px;
        }

        .mode-btn:hover { color: var(--text-main); }
        .mode-btn.active { color: var(--theme-color); box-shadow: var(--shadow-md-inset); }

        /* Tooltip Pomodoro */
        .mode-info {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            color: var(--text-muted);
            cursor: help;
            flex-shrink: 0;
            transition: color 0.3s ease;
        }

        .mode-info svg { width: 14px; height: 14px; pointer-events: none; }

        .mode-info:hover,
        .mode-info:focus-visible { color: var(--brand-teal); outline: none; }

        .mode-tooltip {
            position: absolute;
            bottom: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%) translateY(6px);
            width: 220px;
            padding: 12px 14px;
            background: var(--bg-color);
            color: var(--text-main);
            font-size: 0.72rem;
            font-weight: 500;
            line-height: 1.45;
            border-radius: 14px;
            box-shadow: var(--shadow-lg);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s ease;
            z-index: 200;
            text-align: left;
        }

        .mode-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: var(--bg-color);
        }

        .mode-info:hover .mode-tooltip,
        .mode-info:focus-visible .mode-tooltip,
        .mode-info.open .mode-tooltip {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* ─── Подменю настроек ───────────────────────────────────────────────── */
        .submenu-container {
            width: 100%;
            min-height: 40px;
            margin-bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            transition: all 0.5s ease-in-out;
        }

        .sub-row {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            animation: fadeIn 0.3s ease;
        }

        .sub-toggle {
            background: var(--bg-color);
            border: none;
            padding: 8px 14px;
            border-radius: 10px;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease, background 0.7s ease;
        }

        .sub-toggle.active { color: var(--theme-color); box-shadow: var(--shadow-sm-inset); }

        .sub-input {
            background: var(--bg-color);
            border: none;
            width: 55px;
            padding: 8px;
            text-align: center;
            border-radius: 10px;
            color: var(--theme-color);
            font-size: 1rem;
            font-weight: 700;
            outline: none;
            box-shadow: var(--shadow-sm-inset);
            transition: box-shadow 0.3s ease, color 0.3s ease, background 0.7s ease;
        }

        .sub-input.error {
            box-shadow: var(--shadow-sm-inset), var(--error-glow);
            color: var(--brand-red);
            animation: shakeInput 0.4s ease;
        }

        @keyframes shakeInput {
            0%, 100% { transform: translateX(0); }
            20%       { transform: translateX(-4px); }
            40%       { transform: translateX(4px); }
            60%       { transform: translateX(-3px); }
            80%       { transform: translateX(3px); }
        }

        /* ─── Сцена таймера (хронограф + управление) ───────────────────────── */
        .timer-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            flex: 1 1 auto;
            min-height: 0;
            justify-content: flex-start;
            transition: all 0.5s ease-in-out;
        }

        .timer-dial-wrap {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 0;
            margin: auto 0;
            padding: 24px 0;
            gap: 16px;
            transition: all 0.5s ease-in-out;
        }

        .chrono-outer {
            width: min(290px, 36vh, 72vw);
            height: min(290px, 36vh, 72vw);
            flex-shrink: 0;
            border-radius: 50%;
            background: var(--bg-color);
            box-shadow: var(--shadow-lg);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 0;
            padding: 12px;
            transform: scale(1);
            transform-origin: center center;
            transition: all 0.5s ease-in-out;
        }

        .chrono-inner {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--bg-color);
            box-shadow: var(--shadow-lg-inset);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.7s ease, box-shadow 0.7s ease;
        }

        .chrono-ticks { position: absolute; top: 50%; left: 50%; width: 90%; height: 90%; transform: translate(-50%, -50%); pointer-events: none; }
        .chrono-ticks circle.thick { fill: none; stroke: rgba(163,177,198,0.5); stroke-width: 2.5; stroke-dasharray: 1 11.56; }
        .chrono-ticks circle.thin  { fill: none; stroke: rgba(163,177,198,0.3); stroke-width: 1;   stroke-dasharray: 1 2.31; }

        body.rest-mode .chrono-ticks circle.thick { stroke: rgba(120,140,170,0.45); }
        body.rest-mode .chrono-ticks circle.thin  { stroke: rgba(120,140,170,0.25); }

        .progress-ring {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform: rotate(-90deg);
            z-index: 10;
            pointer-events: none;
        }

        .progress-ring-circle {
            fill: none;
            stroke: var(--theme-color);
            stroke-width: 6;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear, stroke 0.5s ease;
        }

        .time-text {
            position: relative;
            z-index: 20;
            font-size: clamp(2.4rem, 8vmin, 5rem);
            font-weight: 300;
            line-height: 1;
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8), -1px -1px 2px rgba(184,194,209,0.3);
            transition: font-size 0.3s, text-shadow 0.7s ease;
        }

        body.rest-mode .time-text {
            text-shadow: 2px 2px 6px rgba(0,0,0,0.35), -1px -1px 2px rgba(255,255,255,0.06);
        }

        .time-text.long { font-size: clamp(1.8rem, 5.5vmin, 3.5rem); }

        /* ─── Трекер циклов ──────────────────────────────────────────────────── */
        .dots-container {
            display: flex;
            gap: 10px;
            margin-top: 0;
            margin-bottom: 0;
            justify-content: center;
            height: 14px;
            flex-shrink: 0;
            transition: all 0.5s ease-in-out;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--bg-color);
            box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light);
            transition: all 0.3s ease, background 0.7s ease;
        }

        .dot.filled {
            background: var(--theme-color);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.15);
        }

        /* ─── Кнопки управления ──────────────────────────────────────────────── */
        .controls {
            display: flex;
            gap: 24px;
            width: 100%;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 32px;
            transition: all 0.5s ease-in-out;
        }

        .btn {
            border: none;
            padding: 18px 28px;
            border-radius: 18px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease, background 0.7s ease, box-shadow 0.7s ease;
            flex: 1;
            max-width: 160px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .btn-reset { background: var(--bg-color); color: var(--text-muted); box-shadow: var(--shadow-md); }
        .btn-reset:active,
        .btn-reset.active-press { box-shadow: var(--shadow-md-inset); color: var(--text-main); }

        .btn-start {
            background: var(--brand-red);
            color: #ffffff;
            box-shadow: 8px 8px 24px rgba(183,18,52,0.35), -8px -8px 20px var(--shadow-light);
        }

        .btn-start.active-press {
            background: var(--theme-color);
            box-shadow: inset 6px 6px 14px rgba(0,0,0,0.25), inset -4px -4px 10px rgba(255,255,255,0.15);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* ─── Zen-свитч (фиксированный в правом верхнем углу) ───────────────── */
        .zen-switch {
            position: fixed;
            top: 22px;
            right: 28px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
            z-index: 300;
            transition: all 0.5s ease;
        }

        .zen-switch input { display: none; }

        .zen-track {
            width: 44px;
            height: 24px;
            border-radius: 12px;
            background: var(--bg-color);
            box-shadow: var(--shadow-sm-inset);
            position: relative;
            transition: box-shadow 0.3s ease, background 0.7s ease;
        }

        .zen-thumb {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--bg-color);
            box-shadow: var(--shadow-sm);
            transition: left 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s ease, box-shadow 0.3s ease;
        }

        .zen-switch input:checked + .zen-track .zen-thumb {
            left: 23px;
            background: var(--brand-teal);
            box-shadow: 2px 2px 6px rgba(0,101,132,0.4), -1px -1px 4px var(--shadow-light);
        }

        .zen-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .zen-switch input:checked ~ .zen-label { color: var(--brand-teal); }

        body.zen-mode .zen-switch .zen-track {
            box-shadow: var(--shadow-md-inset);
        }

        /* ─── Режим ФОКУСА ───────────────────────────────────────────────────── */
        body.zen-mode .app-card.card {
            background: transparent;
            box-shadow: none;
            border-radius: 0;
            padding: 0;
            pointer-events: none;
        }

        body.zen-mode .card-chrome {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateY(-12px);
            position: absolute;
            width: 100%;
            transition: all 0.5s ease-in-out;
        }

        .card-chrome-bottom {
            position: relative;
            margin-top: 28px;
            flex-shrink: 0;
            width: 100%;
            transition: all 0.5s ease-in-out;
        }

        body.zen-mode .timer-stage {
            position: fixed;
            inset: 0;
            display: grid;
            grid-template-rows: 1fr auto;
            grid-template-columns: 1fr;
            justify-items: center;
            align-items: stretch;
            padding: 24px 20px max(32px, env(safe-area-inset-bottom, 0px));
            z-index: 100;
            pointer-events: none;
        }

        body.zen-mode .timer-dial-wrap {
            grid-row: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            margin: 0;
            width: 100%;
            pointer-events: none;
        }

        body.zen-mode .timer-stage .chrono-outer,
        body.zen-mode .timer-stage .controls,
        body.zen-mode .timer-stage .controls .btn {
            pointer-events: auto;
        }

        body.zen-mode .dots-container {
            display: none;
        }

        body.zen-mode .chrono-outer {
            align-self: center;
            justify-self: center;
            width: min(290px, 36vh, 72vw);
            height: min(290px, 36vh, 72vw);
            margin-bottom: 0;
            flex-shrink: 0;
            transform: scale(1.35);
            transform-origin: center center;
            box-shadow:
                0 20px 40px rgba(0, 0, 0, 0.12),
                0 -20px 40px #ffffff;
        }

        body.zen-mode.rest-mode .chrono-outer {
            box-shadow:
                0 24px 48px rgba(0, 0, 0, 0.45),
                0 -16px 36px rgba(255, 255, 255, 0.04);
        }

        body.zen-mode .controls {
            grid-row: 2;
            align-self: end;
            width: 100%;
            max-width: 480px;
            margin-top: 48px;
            gap: 20px;
            flex-shrink: 0;
            transform: translateY(0);
        }

        /* ─── Панель «Атмосфера» ─────────────────────────────────────────────── */
        .atmosphere-section {
            width: 100%;
            margin-top: 0;
            flex-shrink: 0;
            transition: all 0.5s ease-in-out;
        }

        .atmosphere-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }

        .atmosphere-toggle input { display: none; }

        .atm-switch-track {
            width: 44px;
            height: 24px;
            border-radius: 12px;
            background: var(--bg-color);
            box-shadow: var(--shadow-sm-inset);
            position: relative;
            transition: box-shadow 0.3s ease, background 0.7s ease;
        }

        .atm-switch-thumb {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--bg-color);
            box-shadow: var(--shadow-sm);
            transition: left 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s ease;
        }

        .atmosphere-toggle input:checked + .atm-switch-track {
            box-shadow: var(--shadow-sm-inset);
        }

        .atmosphere-toggle input:checked + .atm-switch-track .atm-switch-thumb {
            left: 23px;
            background: var(--brand-teal);
        }

        .atmosphere-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .atmosphere-toggle input:checked ~ .atmosphere-label { color: var(--brand-teal); }

        .atmosphere-panel {
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.45s ease, opacity 0.35s ease, margin 0.35s ease;
            margin-top: 0;
        }

        .atmosphere-panel.open {
            max-height: 200px;
            opacity: 1;
            margin-top: 14px;
            overflow: visible;
        }

        .atmosphere-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            justify-items: center;
            padding: 6px 4px 8px;
            background: transparent;
            overflow: visible;
        }

        .sound-btn {
            position: relative;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--bg-color);
            box-shadow: var(--shadow-md);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            isolation: isolate;
            transition: color 0.3s ease, background 0.7s ease, box-shadow 0.7s ease, transform 0.3s ease;
        }

        .sound-btn svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none;
        }

        .sound-btn:hover { color: var(--text-main); transform: translateY(-1px); }
        .sound-btn.active { color: var(--brand-teal); box-shadow: var(--shadow-md-inset); }

        .sound-tooltip {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%) translateY(4px);
            padding: 5px 10px;
            background: var(--bg-color);
            color: var(--text-main);
            font-size: 0.7rem;
            font-weight: 600;
            white-space: nowrap;
            border-radius: 8px;
            box-shadow: var(--shadow-sm);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease, visibility 0.25s ease;
            z-index: 50;
        }

        .sound-btn:hover .sound-tooltip,
        .sound-btn:focus-visible .sound-tooltip {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* ─── Адаптив ────────────────────────────────────────────────────────── */
        @media (max-width: 480px) {
            body { padding: 8px; }
            .app-shell { max-height: calc(100vh - 16px); }
            .app-card.card { padding: 22px 16px 16px; border-radius: 32px; }
            .chrono-outer   { width: min(250px, 34vh, 70vw); height: min(250px, 34vh, 70vw); }
            .mode-btn       { padding: 11px 10px; font-size: 0.78rem; }
            .btn            { padding: 15px 20px; font-size: 0.9rem; }
            .header-title   { font-size: 1.3rem; }
            .sound-btn      { width: 44px; height: 44px; }
            .atmosphere-grid { gap: 10px; }
            .zen-switch     { top: 14px; right: 16px; }
            body.zen-mode .timer-stage { padding: 20px 16px max(28px, env(safe-area-inset-bottom, 0px)); }
            body.zen-mode .chrono-outer { transform: scale(1.3); }
        }

        @media (max-height: 720px) {
            .app-card.card { padding: 20px 24px 16px; }
            .header { margin-bottom: 10px; }
            .header-logo { width: 40px; height: 40px; }
            .header-title { font-size: 1.25rem; }
            .modes-grid { margin-bottom: 8px; }
            .submenu-container { min-height: 36px; margin-bottom: 8px; }
            .timer-dial-wrap { padding: 12px 0; }
            .controls { margin-top: 24px; }
            .card-chrome-bottom { margin-top: 20px; }
            .btn { padding: 14px 20px; }
        }

        /* ─── Glass Drawer (промо-пенал) ───────────────────────────────────── */
        .promo-wrap {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .promo-drawer {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            z-index: -1;
            pointer-events: auto;
        }

        .promo-drawer__tab {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            z-index: 2;
            width: 26px;
            height: 88px;
            padding: 10px 4px;
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-left: none;
            border-radius: 0 12px 12px 0;
            background: rgba(255, 255, 255, 0.38);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 3px 0 14px rgba(184, 194, 209, 0.22);
            color: var(--text-muted);
            cursor: pointer;
            pointer-events: auto;
            transition: background 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
        }

        .promo-drawer__tab-label {
            display: block;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            white-space: nowrap;
            line-height: 1;
        }

        .promo-drawer__pen {
            position: absolute;
            left: 0;
            top: 50%;
            width: 210px;
            max-height: min(320px, 52vh);
            display: flex;
            flex-direction: column;
            padding: 14px 12px 12px;
            background: rgba(255, 255, 255, 0.44);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.62);
            border-left: none;
            border-radius: 0 18px 18px 0;
            box-shadow: 6px 0 28px rgba(184, 194, 209, 0.28);
            transform: translate(0, -50%);
            transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .promo-drawer__scroll,
        .promo-sheet__scroll {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            margin-bottom: 10px;
            padding-right: 2px;
            scrollbar-width: thin;
            scrollbar-color: rgba(116, 125, 140, 0.35) transparent;
        }

        .promo-drawer__scroll::-webkit-scrollbar,
        .promo-sheet__scroll::-webkit-scrollbar {
            width: 4px;
        }

        .promo-drawer__scroll::-webkit-scrollbar-thumb,
        .promo-sheet__scroll::-webkit-scrollbar-thumb {
            background: rgba(116, 125, 140, 0.35);
            border-radius: 4px;
        }

        .promo-drawer__list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .promo-drawer__item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            width: 100%;
            padding: 11px 12px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.32);
            color: var(--text-main);
            font-size: 0.84rem;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            white-space: nowrap;
            transition: box-shadow 0.25s ease, transform 0.25s ease, background 0.25s ease;
        }

        .promo-drawer__item:hover {
            box-shadow: var(--shadow-sm);
            transform: translateY(-1px);
        }

        .promo-drawer__item-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .promo-drawer__badge {
            flex-shrink: 0;
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--brand-teal);
            background: rgba(0, 101, 132, 0.1);
            border: 1px solid rgba(0, 101, 132, 0.16);
            padding: 2px 6px;
            border-radius: 5px;
        }

        .promo-drawer__platform {
            flex-shrink: 0;
            width: 100%;
            padding: 13px 14px;
            border: 1px solid rgba(0, 101, 132, 0.28);
            border-radius: 12px;
            background: rgba(0, 101, 132, 0.18);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            color: var(--brand-teal);
            font-size: 0.86rem;
            font-weight: 700;
            text-align: center;
            white-space: nowrap;
            cursor: pointer;
            transition: background 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
        }

        .promo-drawer__platform:hover {
            background: rgba(0, 101, 132, 0.28);
            box-shadow: 0 4px 16px rgba(0, 101, 132, 0.18);
            transform: translateY(-1px);
        }

        .promo-wrap.is-blocked {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .promo-wrap.is-blocked .promo-drawer__pen {
            transform: translate(0, -50%);
        }

        /* Десктоп: hover выезжает вбок */
        @media (min-width: 1024px) {
            .promo-sheet { display: none !important; }

            .promo-wrap:hover .promo-drawer__tab,
            .promo-wrap:focus-within .promo-drawer__tab {
                background: rgba(255, 255, 255, 0.52);
                color: var(--brand-teal);
            }

            .promo-wrap:hover .promo-drawer__pen,
            .promo-wrap:focus-within .promo-drawer__pen {
                transform: translate(calc(-100% + 26px), -50%);
            }
        }

        /* Мобилки: ярлычок снизу + bottom sheet */
        @media (max-width: 1023px) {
            .promo-drawer { display: none; }

            .promo-drawer__tab {
                left: 50%;
                top: auto;
                bottom: -14px;
                transform: translateX(-50%);
                width: 88px;
                height: 26px;
                padding: 4px 10px;
                border-left: 1px solid rgba(255, 255, 255, 0.55);
                border-top: none;
                border-radius: 0 0 12px 12px;
                box-shadow: 0 3px 14px rgba(184, 194, 209, 0.22);
            }

            .promo-drawer__tab-label {
                writing-mode: horizontal-tb;
                transform: none;
                font-size: 0.58rem;
                letter-spacing: 0.6px;
            }

            .promo-sheet {
                position: fixed;
                inset: 0;
                z-index: 400;
                pointer-events: none;
                visibility: hidden;
            }

            .promo-sheet.is-open {
                pointer-events: auto;
                visibility: visible;
            }

            .promo-sheet__backdrop {
                position: absolute;
                inset: 0;
                background: rgba(45, 52, 54, 0.35);
                opacity: 0;
                transition: opacity 0.35s ease;
            }

            .promo-sheet.is-open .promo-sheet__backdrop {
                opacity: 1;
            }

            .promo-sheet__panel {
                position: absolute;
                left: 0;
                right: 0;
                bottom: 0;
                max-height: min(72vh, 520px);
                display: flex;
                flex-direction: column;
                padding: 10px 18px max(18px, env(safe-area-inset-bottom, 0px));
                background: rgba(255, 255, 255, 0.88);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.7);
                border-bottom: none;
                border-radius: 22px 22px 0 0;
                box-shadow: 0 -8px 40px rgba(184, 194, 209, 0.35);
                transform: translateY(100%);
                transition: transform 0.42s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .promo-sheet.is-open .promo-sheet__panel {
                transform: translateY(0);
            }

            .promo-sheet__handle {
                width: 36px;
                height: 4px;
                margin: 0 auto 12px;
                border-radius: 2px;
                background: rgba(116, 125, 140, 0.35);
            }

            .promo-sheet__title {
                font-size: 0.72rem;
                font-weight: 700;
                letter-spacing: 1.2px;
                text-transform: uppercase;
                color: var(--text-muted);
                margin-bottom: 12px;
                text-align: center;
            }

            .promo-sheet__close {
                position: absolute;
                top: 12px;
                right: 14px;
                width: 32px;
                height: 32px;
                border: none;
                border-radius: 50%;
                background: rgba(224, 229, 236, 0.8);
                color: var(--text-muted);
                font-size: 1.25rem;
                line-height: 1;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.2s ease, color 0.2s ease;
            }

            .promo-sheet__close:hover {
                background: rgba(224, 229, 236, 1);
                color: var(--text-main);
            }

            .promo-sheet__platform {
                margin-top: 4px;
            }
        }

        body.rest-mode .promo-drawer__tab {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.14);
        }

        body.rest-mode .promo-drawer__pen {
            background: rgba(30, 38, 52, 0.62);
            border-color: rgba(255, 255, 255, 0.12);
        }

        body.rest-mode .promo-drawer__item {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.1);
        }

        body.rest-mode .promo-sheet__panel {
            background: rgba(28, 36, 51, 0.92);
            border-color: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="tochilka-theme">

    <div class="app-shell">

        <!-- ── Zen-свитч (фиксированный, всегда поверх) ───────────────────── -->
        <label class="zen-switch" id="zenSwitch" title="Режим Фокуса: парящий таймер">
            <input type="checkbox" id="zenToggle" aria-label="Включить режим Фокуса">
            <span class="zen-track"><span class="zen-thumb"></span></span>
            <span class="zen-label">Фокус</span>
        </label>

        <!-- ── Карточка ─────────────────────────────────────────────────────── -->
        <div class="app-card card" role="main">

            <!-- ── Glass Drawer: промо-пенал из-под карточки ───────────────── -->
            <div class="promo-wrap" id="promoWrap">
                <div class="promo-drawer" id="promoDrawer" aria-label="Другие приложения Точилки">
                    <div class="promo-drawer__pen" id="promoDrawerPen" aria-hidden="true">
                        <div class="promo-drawer__scroll">
                            <div class="promo-drawer__list" id="promoDrawerList" role="list"></div>
                        </div>
                        <button class="promo-drawer__platform" type="button" data-app-name="main_platform">
                            На главную платформу
                        </button>
                    </div>
                </div>
                <button
                    class="promo-drawer__tab"
                    id="promoDrawerTab"
                    type="button"
                    aria-expanded="false"
                    aria-controls="promoDrawerPen promoSheetPanel"
                >
                    <span class="promo-drawer__tab-label">[ПРОМО_ТЕКСТ]</span>
                </button>
            </div>

            <div class="promo-sheet" id="promoSheet" aria-hidden="true">
                <div class="promo-sheet__backdrop" id="promoSheetBackdrop"></div>
                <div
                    class="promo-sheet__panel"
                    id="promoSheetPanel"
                    role="dialog"
                    aria-modal="true"
                    aria-labelledby="promoSheetTitle"
                >
                    <button class="promo-sheet__close" id="promoSheetClose" type="button" aria-label="Закрыть">&times;</button>
                    <div class="promo-sheet__handle" aria-hidden="true"></div>
                    <h2 class="promo-sheet__title" id="promoSheetTitle">Ещё от Точилки</h2>
                    <div class="promo-sheet__scroll">
                        <div class="promo-drawer__list" id="promoSheetList" role="list"></div>
                    </div>
                    <button class="promo-drawer__platform promo-sheet__platform" type="button" data-app-name="main_platform">
                        На главную платформу
                    </button>
                </div>
            </div>

            <div class="card-chrome">

            <header class="header">
                <img
                    src="https://raw.githubusercontent.com/onlinetochilka/theme/main/tochilka-logo.svg"
                    class="header-logo"
                    id="brandLogo"
                    alt="Логотип Точилки"
                    width="48"
                    height="48"
                >
                <div class="header-text">
                    <div class="header-title">Фокус-таймер</div>
                    <div class="header-slogan">Внимание к главному</div>
                </div>
            </header>

            <!-- ── Сетка режимов 2×2 ──────────────────────────────────────── -->
            <nav class="modes-grid" aria-label="Режимы таймера">
                <button class="mode-btn active" data-mode="work" aria-pressed="true" title="Рабочий режим — задайте часы и минуты">Работа</button>
                <button class="mode-btn" data-mode="rest" aria-pressed="false" title="Режим отдыха — настройка длительности перерыва">Отдых</button>
                <button class="mode-btn" data-mode="pomodoro" aria-pressed="false" title="Pomodoro — интервалы работы и отдыха с циклами">
                    Pomodoro
                    <span class="mode-info" tabindex="0" role="button" aria-label="Подробнее о Pomodoro">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="16" x2="12" y2="12"/>
                            <line x1="12" y1="8" x2="12.01" y2="8"/>
                        </svg>
                        <span class="mode-tooltip">Метод интервальной работы: 25 минут полного фокуса и 5 минут отдыха (или 50/10 для глубоких задач). Помогает не отвлекаться и предотвращает выгорание.</span>
                    </span>
                </button>
                <button class="mode-btn" data-mode="lesson" aria-pressed="false" title="Режим урока — 40 или 45 минут с циклами">Урок</button>
            </nav>

            <div id="submenuContainer" class="submenu-container" aria-label="Настройки выбранного режима"></div>

            </div><!-- /.card-chrome -->

            <!-- ── Сцена таймера (центрируется в zen-mode) ─────────────────── -->
            <div class="timer-stage" id="timerStage">
            <div class="timer-dial-wrap">
            <div class="chrono-outer" aria-hidden="true">
                <div class="chrono-inner" id="chronoInner">
                    <svg class="chrono-ticks" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <circle class="thick" cx="50" cy="50" r="48" />
                        <circle class="thin"  cx="50" cy="50" r="44" />
                    </svg>
                    <svg class="progress-ring" viewBox="0 0 250 250">
                        <circle class="progress-ring-circle" id="progressCircle" cx="125" cy="125" r="118"></circle>
                    </svg>
                    <div
                        class="time-text"
                        id="timeDisplay"
                        role="timer"
                        aria-live="polite"
                        aria-atomic="true"
                        aria-label="Осталось: 25:00"
                    >25:00</div>
                </div>
            </div>

            <div id="dotsContainer" class="dots-container" aria-label="Прогресс циклов"></div>
            </div><!-- /.timer-dial-wrap -->

            <div class="controls">
                <button class="btn btn-reset" id="resetBtn" aria-label="Сбросить таймер">Сброс</button>
                <button class="btn btn-start" id="startBtn" aria-label="Запустить таймер">Старт</button>
            </div>
            </div><!-- /.timer-stage -->

            <!-- ── Панель «Атмосфера» (внизу карточки) ─────────────────────── -->
            <div class="card-chrome card-chrome-bottom">
            <div class="atmosphere-section" id="atmosphereSection">
                <label class="atmosphere-toggle" id="atmosphereToggleLabel">
                    <input type="checkbox" id="atmosphereToggle" aria-label="Включить атмосферу">
                    <span class="atm-switch-track"><span class="atm-switch-thumb"></span></span>
                    <span class="atmosphere-label">Атмосфера</span>
                </label>

                <div class="atmosphere-panel" id="atmospherePanel" aria-hidden="true">
                    <div class="atmosphere-grid" id="atmosphereGrid" role="group" aria-label="Выбор фонового звука">
                        <!-- Кнопки генерируются app.js -->
                    </div>
                </div>
            </div>
            </div><!-- /.card-chrome-bottom -->

        </div><!-- /.app-card -->

    </div><!-- /.app-shell -->

    <script type="module" src="app.js"></script>
</body>
</html>
