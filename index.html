    <title>Умный таймер — Premium Soft UI</title>

    <!-- Дизайн-система Точилки — базовые токены и глобальные стили -->
    <link rel="stylesheet" href="https://raw.githubusercontent.com/onlinetochilka/theme/main/tochilka-theme.css">
    <link rel="stylesheet" href="timer-styles.css">
</head>

<body class="tochilka-theme">

    <div class="app-shell">

        <!-- ── Кнопка полноэкранного режима (фиксированная, всегда поверх) ── -->
        <button class="fullscreen-btn" id="fullscreenBtn" title="Полноэкранный режим" aria-label="Переключить полноэкранный режим">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="15 3 21 3 21 9"/>
                <polyline points="9 21 3 21 3 15"/>
                <line x1="21" y1="3" x2="14" y2="10"/>
                <line x1="3" y1="21" x2="10" y2="14"/>
            </svg>
        </button>

        <!-- ── Стек: панель (низ) + таймер (верх) ───────────────────────────── -->
        <div class="timer-stack">

            <!-- Элемент Б: выезжающая панель (z-index: 1) -->
            <aside
                class="glass-drawer"
                id="glassDrawer"
                aria-label="Другие приложения Точилки"
                aria-hidden="false"
            >
                <div class="glass-drawer__panel" id="glassDrawerPanel">
                    <div class="scroll-hint scroll-hint--top" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="18 15 12 9 6 15"/>
                        </svg>
                    </div>
                    <div class="glass-drawer__scroll" id="glassDrawerScroll">
                        <!-- populated by JS -->
                    </div>
                    <div class="scroll-hint scroll-hint--bottom" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"/>
                        </svg>
                    </div>
                </div>
                <span class="glass-drawer__tab" id="glassDrawerTab" aria-hidden="true">Сменить фокус</span>
            </aside>

            <!-- Элемент А: карточка таймера (z-index: 2) -->
            <div class="app-card card" role="main">

            <div class="timer-top-layer">

            <div class="card-chrome">

            <header class="header">
                <img
                    src="https://raw.githubusercontent.com/onlinetochilka/theme/main/tochilka-logo.svg"
                    class="header-logo"
                    id="brandLogo"
                    alt="Логотип Точилки"
                    width="48"
                    height="48"
                >
                <div class="header-text">
                    <div class="header-title">Умный таймер</div>
                    <div class="header-slogan">Внимание к главному</div>
                </div>
            </header>

            <!-- ── Сетка режимов 2×2 ──────────────────────────────────────── -->
            <nav class="modes-grid" aria-label="Режимы таймера">
                <button class="mode-btn active" data-mode="work" aria-pressed="true">Работа</button>
                <button class="mode-btn" data-mode="rest" aria-pressed="false">Отдых</button>
                <button class="mode-btn" data-mode="pomodoro" aria-pressed="false">
                    Pomodoro
                    <span class="mode-info" tabindex="0" role="button" aria-label="Подробнее о Pomodoro">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="16" x2="12" y2="12"/>
                            <line x1="12" y1="8" x2="12.01" y2="8"/>
                        </svg>
                        <span class="mode-tooltip">Интервалы концентрации: 25(50) минут полного фокуса и 5(10) минут перерыва. Помогает не отвлекаться и защищает от переутомления.</span>
                    </span>
                </button>
                <button class="mode-btn" data-mode="lesson" aria-pressed="false">Урок</button>
            </nav>

            <div id="submenuContainer" class="submenu-container" aria-label="Настройки выбранного режима"></div>

            </div><!-- /.card-chrome -->

            <!-- ── Сцена таймера (центрируется в zen-mode) ─────────────────── -->
            <div class="timer-stage" id="timerStage">
            <div class="timer-dial-wrap">
            <div class="pomodoro-container" id="pomodoroContainer">
            <div class="chrono-outer" aria-hidden="true">
                <div class="chrono-inner" id="chronoInner">
                    <svg class="chrono-ticks" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <circle class="thick" cx="50" cy="50" r="48" />
                        <circle class="thin"  cx="50" cy="50" r="44" />
                    </svg>
                    <svg class="progress-ring" viewBox="0 0 250 250">
                        <circle class="progress-ring-circle" id="progressCircle" cx="125" cy="125" r="118"></circle>
                    </svg>
                    <div
                        class="time-text"
                        id="timeDisplay"
                        role="timer"
                        aria-live="polite"
                        aria-atomic="true"
                        aria-label="Осталось: 25:00"
                    >25:00</div>
                </div>
            </div>

            <div id="dotsContainer" class="dots-container" aria-label="Прогресс циклов"></div>
            </div><!-- /.pomodoro-container -->
            </div><!-- /.timer-dial-wrap -->

            <div class="controls">
                <button class="btn btn-reset" id="resetBtn" aria-label="Сбросить таймер">Сброс</button>
                <button class="btn btn-start" id="startBtn" aria-label="Запустить таймер">Старт</button>
            </div>
            </div><!-- /.timer-stage -->

            <!-- ── Панель «Атмосфера» (внизу карточки) ─────────────────────── -->
            <div class="card-chrome card-chrome-bottom">
            <div class="atmosphere-section" id="atmosphereSection">
                <label class="atmosphere-toggle" id="atmosphereToggleLabel">
                    <input type="checkbox" id="atmosphereToggle" aria-label="Включить атмосферу">
                    <span class="atm-switch-track"><span class="atm-switch-thumb"></span></span>
                    <span class="atmosphere-label">Атмосфера</span>
                </label>

                <div class="atmosphere-panel" id="atmospherePanel" aria-hidden="true">
                    <div class="atmosphere-grid" id="atmosphereGrid" role="group" aria-label="Выбор фонового звука">
                        <!-- Кнопки генерируются app.js -->
                    </div>
                </div>
            </div>
            </div><!-- /.card-chrome-bottom -->

            </div><!-- /.timer-top-layer -->

            </div><!-- /.app-card -->

        </div><!-- /.timer-stack -->

    </div><!-- /.app-shell -->

    <script type="module" src="app.js"></script>
</body>
</html>
